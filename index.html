<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Visual de Redes para Automação</title>
    <style>
        /* TEMA DE CORES: PRETO E AZUL */
        :root {
            --bg-principal: #050811;
            --bg-card: #0d1527;
            --bg-nav: #090e1a;
            --azul-eletrico: #0066ff;
            --azul-brilhante: #3385ff;
            --azul-escuro: #0a2240;
            --texto-claro: #f0f5ff;
            --texto-escuro: #8fa3c7;
            --verde-sucesso: #00cc66;
            --vermelho-erro: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR & IDIOMAS */
        header {
            background-color: var(--bg-nav);
            border-bottom: 2px solid var(--azul-escuro);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-container h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 102, 255, 0.5);
        }

        .lang-selector {
            display: flex;
            background: var(--bg-principal);
            border: 1px solid var(--azul-escuro);
            padding: 4px;
            border-radius: 8px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--texto-escuro);
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background-color: var(--azul-eletrico);
            color: white;
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.4);
        }

        /* NAVEGAÇÃO DE ABAS */
        nav {
            background-color: var(--bg-nav);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--azul-escuro);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--texto-escuro);
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: var(--azul-brilhante);
        }

        .tab-btn.active {
            color: var(--azul-eletrico);
            border-bottom-color: var(--azul-eletrico);
            background: linear-gradient(to bottom, transparent, rgba(0, 102, 255, 0.05));
        }

        /* CONTEÚDO PRINCIPAL */
        main {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* CARDS DA ABA 1: CABOS */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(30px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        @media(min-width: 600px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--azul-escuro);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--azul-eletrico);
            box-shadow: 0 10px 25px rgba(0, 102, 255, 0.15);
        }

        .card-img-container {
            height: 180px;
            background: linear-gradient(135deg, #09101f, #050811);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--azul-escuro);
        }

        .card-body {
            padding: 25px;
        }

        .card-body h3 {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .card-body p {
            color: var(--texto-escuro);
            font-size: 14px;
            line-height: 1.5;
        }

        .expand-panel {
            background-color: var(--bg-card);
            border: 2px solid var(--azul-eletrico);
            border-radius: 14px;
            padding: 30px;
            margin-top: 30px;
            display: none;
        }

        .expand-panel h2 {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .info-block {
            margin-top: 20px;
            background-color: rgba(5, 8, 17, 0.6);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--azul-eletrico);
        }

        .info-block h4 {
            color: var(--azul-brilhante);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* CONTROLES DA ABA 2: TOPOLOGIAS */
        .topology-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn-topo {
            background-color: var(--bg-card);
            border: 1px solid var(--azul-escuro);
